<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal del Cliente — Profit Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0a1a;
      --bg-card: #150b28;
      --border: rgba(123,108,246,0.12);
      --text: #c4c4d4;
      --text-heading: #ffffff;
      --text-muted: #8888a8;
      --primary: #7B6CF6;
      --green: #1DB954;
      --orange: #F5A623;
      --red: #E74C3C;
      --blue: #4A90D9;
      --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .portal-container { max-width:900px; margin:0 auto; padding:40px 24px; }
    .portal-header { text-align:center; margin-bottom:40px; }
    .portal-logo { font-size:0.85rem; font-weight:600; color:var(--primary); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
    .portal-project-name { font-size:2rem; font-weight:700; color:var(--text-heading); margin-bottom:8px; }
    .portal-client { font-size:1rem; color:var(--text-muted); margin-bottom:16px; }
    .portal-status { display:inline-flex; padding:6px 16px; border-radius:20px; font-size:0.82rem; font-weight:600; }
    .portal-status.active { background:rgba(74,144,217,0.15); color:var(--blue); }
    .portal-status.completed { background:rgba(29,185,84,0.15); color:var(--green); }
    .portal-status.paused { background:rgba(245,166,35,0.15); color:var(--orange); }

    .portal-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px; }
    .portal-kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; position:relative; overflow:hidden; }
    .portal-kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent); }
    .portal-kpi-label { font-size:0.78rem; color:var(--text-muted); margin-bottom:6px; }
    .portal-kpi-value { font-size:1.5rem; font-weight:700; color:var(--text-heading); }

    .portal-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:24px; }
    .portal-section h2 { font-size:1.1rem; font-weight:600; color:var(--text-heading); margin-bottom:16px; display:flex; align-items:center; gap:8px; }

    .portal-task { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
    .portal-task:last-child { border-bottom:none; }
    .portal-task-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .portal-task-dot.done { background:var(--green); }
    .portal-task-dot.in_progress { background:var(--primary); }
    .portal-task-dot.pending { background:var(--orange); }
    .portal-task-title { flex:1; font-size:0.9rem; }
    .portal-task-title.done { text-decoration:line-through; opacity:0.6; }
    .portal-task-badge { font-size:0.72rem; padding:3px 10px; border-radius:12px; font-weight:600; }
    .portal-task-badge.done { background:rgba(29,185,84,0.12); color:var(--green); }
    .portal-task-badge.in_progress { background:rgba(123,108,246,0.12); color:var(--primary); }
    .portal-task-badge.pending { background:rgba(245,166,35,0.12); color:var(--orange); }

    .portal-progress { margin:20px 0; }
    .portal-progress-bar { height:10px; background:rgba(123,108,246,0.1); border-radius:5px; overflow:hidden; }
    .portal-progress-fill { height:100%; border-radius:5px; background:linear-gradient(90deg, var(--primary), #9B8AFB); transition:width 0.5s; }
    .portal-progress-label { display:flex; justify-content:space-between; margin-top:8px; font-size:0.78rem; color:var(--text-muted); }

    .portal-invoice { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
    .portal-invoice:last-child { border-bottom:none; }
    .portal-inv-amount { font-size:1.05rem; font-weight:700; color:var(--text-heading); }
    .portal-inv-status { font-size:0.75rem; padding:3px 10px; border-radius:12px; font-weight:600; }
    .portal-inv-status.paid { background:rgba(29,185,84,0.12); color:var(--green); }
    .portal-inv-status.pending { background:rgba(245,166,35,0.12); color:var(--orange); }
    .portal-inv-status.overdue { background:rgba(231,76,60,0.12); color:var(--red); }

    .portal-footer { text-align:center; margin-top:40px; padding-top:20px; border-top:1px solid var(--border); }
    .portal-footer p { color:var(--text-muted); font-size:0.78rem; }
    .portal-footer a { color:var(--primary); text-decoration:none; }

    .portal-error { text-align:center; padding:80px 20px; }
    .portal-error h2 { font-size:1.5rem; color:var(--text-heading); margin-bottom:12px; }
    .portal-error p { color:var(--text-muted); }

    .portal-loading { text-align:center; padding:80px 20px; color:var(--text-muted); }
    .portal-loading .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width:640px) {
      .portal-grid { grid-template-columns:1fr; }
      .portal-project-name { font-size:1.4rem; }
    }
  </style>
</head>
<body>
  <div class="portal-container" id="portal-content">
    <div class="portal-loading">
      <div class="spinner"></div>
      <p>Cargando proyecto...</p>
    </div>
  </div>

  <script>
    (async function() {
      const token = window.location.pathname.split('/portal/')[1];
      if (!token) return showError('Link inválido');

      try {
        const res = await fetch('/api/portal/view/' + token);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        renderPortal(data);
      } catch {
        showError('Este portal no existe o fue desactivado');
      }
    })();

    function showError(msg) {
      document.getElementById('portal-content').innerHTML =
        '<div class="portal-error"><h2>😕 Portal no disponible</h2><p>' + msg + '</p></div>' +
        '<div class="portal-footer"><p>Powered by <a href="https://profit-code-management.vercel.app">Profit Code</a></p></div>';
    }

    function renderPortal(data) {
      const p = data.project;
      const tasks = data.tasks || [];
      const invoices = data.invoices || [];

      const done = tasks.filter(t => t.status === 'done').length;
      const total = tasks.length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      const totalInv = invoices.reduce((s, i) => s + i.amount, 0);
      const paidInv = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + i.amount, 0);

      const statusMap = { active: 'En Progreso', completed: 'Completado', paused: 'Pausado' };
      const statusLabels = { done: 'Listo', in_progress: 'En Progreso', pending: 'Pendiente' };
      const invLabels = { paid: 'Pagada', pending: 'Pendiente', overdue: 'Vencida' };

      document.title = p.name + ' — Portal del Cliente';

      document.getElementById('portal-content').innerHTML = `
        <div class="portal-header">
          <div class="portal-logo">⚡ Profit Code</div>
          <h1 class="portal-project-name">${esc(p.name)}</h1>
          <p class="portal-client">${esc(p.client_name || '')}</p>
          <span class="portal-status ${p.status}">${statusMap[p.status] || p.status}</span>
        </div>

        <div class="portal-grid">
          <div class="portal-kpi" style="--accent:#7B6CF6">
            <div class="portal-kpi-label">Progreso</div>
            <div class="portal-kpi-value">${pct}%</div>
          </div>
          <div class="portal-kpi" style="--accent:#1DB954">
            <div class="portal-kpi-label">Tareas completadas</div>
            <div class="portal-kpi-value">${done} / ${total}</div>
          </div>
          <div class="portal-kpi" style="--accent:#F5A623">
            <div class="portal-kpi-label">Presupuesto</div>
            <div class="portal-kpi-value">$${(p.budget || 0).toLocaleString()}</div>
          </div>
          <div class="portal-kpi" style="--accent:#4A90D9">
            <div class="portal-kpi-label">Facturado</div>
            <div class="portal-kpi-value">$${totalInv.toLocaleString()}</div>
          </div>
        </div>

        <div class="portal-section">
          <h2>📋 Tareas del Proyecto</h2>
          <div class="portal-progress">
            <div class="portal-progress-bar"><div class="portal-progress-fill" style="width:${pct}%"></div></div>
            <div class="portal-progress-label"><span>${done} completadas</span><span>${total - done} pendientes</span></div>
          </div>
          ${tasks.length ? tasks.map(t => `
            <div class="portal-task">
              <div class="portal-task-dot ${t.status}"></div>
              <span class="portal-task-title ${t.status}">${esc(t.title)}</span>
              <span class="portal-task-badge ${t.status}">${statusLabels[t.status] || t.status}</span>
            </div>
          `).join('') : '<p style="color:var(--text-muted)">Sin tareas asignadas</p>'}
        </div>

        ${invoices.length ? `
        <div class="portal-section">
          <h2>💰 Facturación</h2>
          ${invoices.map(inv => `
            <div class="portal-invoice">
              <div>
                <div class="portal-inv-amount">$${inv.amount.toLocaleString()}</div>
                ${inv.due_date ? '<div style="font-size:0.75rem;color:var(--text-muted)">Vence: ' + inv.due_date + '</div>' : ''}
              </div>
              <span class="portal-inv-status ${inv.status}">${invLabels[inv.status] || inv.status}</span>
            </div>
          `).join('')}
          <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;">
            <span style="color:var(--text-muted);font-size:0.85rem">Total facturado</span>
            <strong style="color:var(--text-heading)">$${totalInv.toLocaleString()}</strong>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:4px">
            <span style="color:var(--text-muted);font-size:0.85rem">Cobrado</span>
            <strong style="color:var(--green)">$${paidInv.toLocaleString()}</strong>
          </div>
        </div>
        ` : ''}

        ${p.description ? `
        <div class="portal-section">
          <h2>📝 Descripción</h2>
          <p style="line-height:1.6">${esc(p.description)}</p>
        </div>
        ` : ''}

        ${p.deadline ? `
        <div class="portal-section">
          <h2>📅 Fecha de entrega</h2>
          <p style="font-size:1.1rem;font-weight:600;color:var(--text-heading)">${new Date(p.deadline + 'T12:00:00').toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</p>
        </div>
        ` : ''}

        <div class="portal-footer">
          <p>Powered by <a href="https://profit-code-management.vercel.app">Profit Code</a> ⚡</p>
        </div>
      `;
    }

    function esc(str) {
      if (!str) return '';
      var d = document.createElement('div');
      d.textContent = String(str);
      return d.innerHTML;
    }
  </script>
</body>
</html>
