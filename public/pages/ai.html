<div class="ai-page">
  <div class="ai-layout">
    <!-- Input panel -->
    <div class="meetings-calendar-card">
      <h3>🤖 Asistente IA</h3>
      <div class="ai-type-grid">
        <button class="ai-type-btn active" data-type="proposal" onclick="Pages.ai.setType('proposal', this)">
          <span>📝</span> Propuesta
        </button>
        <button class="ai-type-btn" data-type="estimate" onclick="Pages.ai.setType('estimate', this)">
          <span>💰</span> Presupuesto
        </button>
        <button class="ai-type-btn" data-type="summary" onclick="Pages.ai.setType('summary', this)">
          <span>📋</span> Resumen
        </button>
        <button class="ai-type-btn" data-type="tasks" onclick="Pages.ai.setType('tasks', this)">
          <span>✅</span> Tareas
        </button>
      </div>
      <div class="form-group" style="margin-top:16px">
        <label id="ai-context-label">Describe el proyecto o contexto</label>
        <textarea id="ai-context" rows="5" placeholder="Ej: Landing page para empresa de construcción, 5 secciones, formulario de contacto, responsive..."></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%" id="ai-generate-btn" onclick="Pages.ai.generate()">
        <span id="ai-btn-text">Generar con IA</span>
        <div class="login-btn-loader" id="ai-loader" style="display:none"><div class="spinner"></div></div>
      </button>
    </div>

    <!-- Output panel -->
    <div class="meetings-list-card">
      <h3 id="ai-result-title">Resultado</h3>
      <div id="ai-result" class="ai-result-content">
        <div class="empty-state" style="padding:40px"><div class="icon">✨</div><p>Genera algo con IA y aparecerá aquí</p></div>
      </div>
      <div id="ai-actions" style="display:none;margin-top:16px;display:flex;gap:8px;">
        <button class="btn btn-ghost" onclick="Pages.ai.copy()">📋 Copiar</button>
      </div>
    </div>
  </div>
</div>
