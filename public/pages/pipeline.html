<div class="pipeline-page">
  <div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
    <button class="btn btn-primary" id="btn-new-pipeline-client" onclick="Pages.pipeline.openNewClient()">+ Nuevo Cliente</button>
  </div>

  <div class="pipeline-kpi-strip" id="pipeline-kpis"></div>

  <div class="pipeline-board">
    <div class="pipeline-column" style="border-top:3px solid #4A90D9;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h4 style="margin:0;">Leads</h4>
        <span class="pipeline-count" data-stage-count="lead" style="background:rgba(74,144,217,0.15);color:#4A90D9;font-size:0.75rem;font-weight:700;padding:2px 10px;border-radius:20px;">0</span>
      </div>
      <div class="pipeline-cards" data-stage="lead"></div>
    </div>
    <div class="pipeline-column" style="border-top:3px solid #F5A623;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h4 style="margin:0;">Propuesta</h4>
        <span class="pipeline-count" data-stage-count="proposal" style="background:rgba(245,166,35,0.15);color:#F5A623;font-size:0.75rem;font-weight:700;padding:2px 10px;border-radius:20px;">0</span>
      </div>
      <div class="pipeline-cards" data-stage="proposal"></div>
    </div>
    <div class="pipeline-column" style="border-top:3px solid #7B6CF6;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h4 style="margin:0;">En Desarrollo</h4>
        <span class="pipeline-count" data-stage-count="development" style="background:rgba(123,108,246,0.15);color:#7B6CF6;font-size:0.75rem;font-weight:700;padding:2px 10px;border-radius:20px;">0</span>
      </div>
      <div class="pipeline-cards" data-stage="development"></div>
    </div>
    <div class="pipeline-column" style="border-top:3px solid #1DB954;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h4 style="margin:0;">Entregado</h4>
        <span class="pipeline-count" data-stage-count="delivered" style="background:rgba(29,185,84,0.15);color:#1DB954;font-size:0.75rem;font-weight:700;padding:2px 10px;border-radius:20px;">0</span>
      </div>
      <div class="pipeline-cards" data-stage="delivered"></div>
    </div>
    <div class="pipeline-column" style="border-top:3px solid #00CEC9;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h4 style="margin:0;">Cobrado</h4>
        <span class="pipeline-count" data-stage-count="paid" style="background:rgba(0,206,201,0.15);color:#00CEC9;font-size:0.75rem;font-weight:700;padding:2px 10px;border-radius:20px;">0</span>
      </div>
      <div class="pipeline-cards" data-stage="paid"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-client">
    <div class="modal">
      <h2>Nuevo Cliente</h2>
      <form id="form-client">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" id="client-name" required placeholder="Nombre del contacto">
        </div>
        <div class="form-group">
          <label>Empresa</label>
          <input type="text" id="client-company" placeholder="Nombre de la empresa">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="client-email" placeholder="email@ejemplo.com">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="client-phone" placeholder="+54 11 1234-5678">
        </div>
        <div class="form-group">
          <label>Notas</label>
          <textarea id="client-notes" rows="2" placeholder="Notas sobre el cliente..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal('modal-client')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Crear Cliente</button>
        </div>
      </form>
    </div>
  </div>
</div>
