<div class="dashboard-page">
  <div class="greeting" style="margin-bottom:28px;">
    <h2 class="greeting-title"><span id="greeting-label">Hola,</span> <span id="greeting-name">...</span></h2>
  </div>

  <div class="dashboard-kpi-grid" id="dashboard-kpis"></div>

  <div class="dashboard-charts-row">
    <div class="dashboard-card" style="animation-delay:250ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span data-stat-label="dash_revenue_chart">Ingresos vs Gastos</span>
      </h3>
      <div style="position:relative;height:300px;">
        <canvas id="chart-revenue"></canvas>
      </div>
    </div>

    <div class="dashboard-card" style="animation-delay:320ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span data-stat-label="dash_pipeline_chart">Pipeline</span>
      </h3>
      <div style="position:relative;height:300px;">
        <canvas id="chart-pipeline"></canvas>
      </div>
    </div>
  </div>

  <!-- NEW: Profit Trend + Top Clients -->
  <div class="dashboard-charts-row" style="animation-delay:380ms">
    <div class="dashboard-card">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span data-stat-label="dash_profit_trend">Tendencia de Ganancia</span>
      </h3>
      <div style="position:relative;height:280px;">
        <canvas id="chart-profit-trend"></canvas>
      </div>
    </div>

    <div class="dashboard-card">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span data-stat-label="dash_top_clients">Top Clientes</span>
      </h3>
      <div id="dash-top-clients" class="dash-top-clients"></div>
    </div>
  </div>

  <!-- NEW: Tasks + Projects at Risk -->
  <div class="dashboard-charts-row" style="animation-delay:440ms">
    <div class="dashboard-card">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span data-stat-label="dash_task_overview">Resumen de Tareas</span>
      </h3>
      <div id="dash-task-overview" class="dash-task-overview"></div>
    </div>

    <div class="dashboard-card">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span data-stat-label="dash_at_risk">Proyectos en Riesgo</span>
      </h3>
      <div id="dash-at-risk" class="dash-at-risk"></div>
    </div>
  </div>

  <div class="dashboard-bottom-row">
    <div class="dashboard-card" style="animation-delay:500ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span data-stat-label="dash_financial">Resumen Financiero</span>
      </h3>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_expenses_month">Gastos del Mes</span>
        <strong id="stat-expenses">$0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_pipeline_clients">Clientes en Pipeline</span>
        <strong id="stat-pipeline-total">0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_new_leads">Leads Nuevos</span>
        <strong id="stat-leads">0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_conversion">Tasa de Conversión</span>
        <strong id="stat-conversion">0%</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_total_revenue">Ingresos Totales</span>
        <strong id="stat-total-revenue" style="color:#1DB954">$0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_total_expenses">Gastos Totales</span>
        <strong id="stat-total-expenses" style="color:#E74C3C">$0</strong>
      </div>
    </div>

    <div class="dashboard-card" style="animation-delay:560ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
        <span data-stat-label="dash_expense_dist">Distribución de Gastos</span>
      </h3>
      <div style="position:relative;height:200px;">
        <canvas id="chart-expenses"></canvas>
      </div>
    </div>
  </div>
</div>
