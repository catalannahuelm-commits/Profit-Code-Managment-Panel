<div class="dashboard-page">
  <div class="greeting" style="margin-bottom:28px;">
    <h2 class="text-gradient" style="font-size:1.6rem;font-weight:700"><span id="greeting-label">Hola,</span> <span id="greeting-name">...</span></h2>
  </div>

  <div class="dashboard-kpi-grid" id="dashboard-kpis"></div>

  <div class="dashboard-charts-row">
    <div class="dashboard-card" style="animation-delay:250ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span data-stat-label="dash_revenue_chart">Ingresos vs Gastos</span>
      </h3>
      <div style="position:relative;height:300px;">
        <canvas id="chart-revenue"></canvas>
      </div>
    </div>

    <div class="dashboard-card" style="animation-delay:320ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span data-stat-label="dash_pipeline_chart">Pipeline</span>
      </h3>
      <div style="position:relative;height:300px;">
        <canvas id="chart-pipeline"></canvas>
      </div>
    </div>
  </div>

  <div class="dashboard-bottom-row">
    <div class="dashboard-card" style="animation-delay:400ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        <span data-stat-label="dash_financial">Resumen Financiero</span>
      </h3>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_expenses_month">Gastos del Mes</span>
        <strong id="stat-expenses">$0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_pipeline_clients">Clientes en Pipeline</span>
        <strong id="stat-pipeline-total">0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_new_leads">Leads Nuevos</span>
        <strong id="stat-leads">0</strong>
      </div>
      <div class="dashboard-stat-row">
        <span data-stat-label="dash_conversion">Tasa de Conversión</span>
        <strong id="stat-conversion">0%</strong>
      </div>
    </div>

    <div class="dashboard-card" style="animation-delay:460ms">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
        <span data-stat-label="dash_expense_dist">Distribución de Gastos</span>
      </h3>
      <div style="position:relative;height:200px;">
        <canvas id="chart-expenses"></canvas>
      </div>
    </div>
  </div>
</div>
