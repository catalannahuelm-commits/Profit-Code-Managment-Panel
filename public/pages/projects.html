<div class="projects-page">
  <div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
    <button class="btn btn-primary" id="btn-new-project" onclick="Pages.projects.openNew()">+ Nuevo Proyecto</button>
  </div>

  <div class="projects-kpi-grid" id="projects-kpis"></div>

  <div class="search-bar">
    <span class="search-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </span>
    <input type="text" id="projects-search" placeholder="Buscar proyectos o clientes..." oninput="Pages.projects.filter(this.value)">
  </div>

  <div class="projects-grid" id="projects-grid"></div>

  <div class="modal-overlay" id="modal-project">
    <div class="modal">
      <h2>Nuevo Proyecto</h2>
      <form id="form-project">
        <div class="form-group">
          <label>Cliente</label>
          <select id="project-client" required>
            <option value="">Seleccionar cliente...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nombre del Proyecto</label>
          <input type="text" id="project-name" required placeholder="Ej: E-commerce Fashion Store">
        </div>
        <div class="form-group">
          <label>Descripción</label>
          <textarea id="project-description" rows="2" placeholder="Descripción del proyecto..."></textarea>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div class="form-group">
            <label>Presupuesto ($)</label>
            <input type="number" id="project-budget" placeholder="0">
          </div>
          <div class="form-group">
            <label>Fecha de Entrega</label>
            <input type="date" id="project-deadline">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal-project').classList.remove('active')">Cancelar</button>
          <button type="submit" class="btn btn-primary">Crear Proyecto</button>
        </div>
      </form>
    </div>
  </div>
</div>
