<div class="chat-page">
  <div class="chat-container">
    <div class="chat-messages" id="chat-messages">
      <div class="empty-state" style="padding:40px"><div class="icon">💬</div><p id="chat-empty-text">Sin mensajes todavía</p></div>
    </div>
    <div class="chat-input-bar">
      <input type="text" id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off">
      <button class="chat-send-btn" id="chat-send" onclick="Pages.chat.send()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>
